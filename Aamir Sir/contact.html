<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Aamir Shaikh</title>
    
    <script>
        const theme = localStorage.getItem('theme') || 
                      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://unpkg.com/nprogress@0.2.0/nprogress.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="section-padding pt-5 mt-5">
        <div class="container-md">
            <div class="text-center mb-5" data-aos="fade-up">
                <h2 class="fw-bold">Get In Touch</h2>
                <p class="text-secondary">Have a question or proposal? I'd love to hear from you.</p>
            </div>
            
            <div class="row g-5">
                <div class="col-lg-4" data-aos="fade-right">
                    <div class="card p-4 mb-4">
                        <h5 class="fw-bold h6 mb-3">Contact Information</h5>
                        <ul class="list-unstyled text-secondary small mb-0">
                            <li class="mb-3 d-flex align-items-center"><i class="fas fa-envelope text-primary me-3 fa-lg"></i> aamir729039@gmail.com</li>
                            <li class="mb-3 d-flex align-items-center"><i class="fas fa-phone text-primary me-3 fa-lg"></i> +91 9099 885 885</li>
                            <li class="mb-0 d-flex align-items-center"><i class="fas fa-map-marker-alt text-primary me-3 fa-lg"></i> Valsad, Gujarat, India</li>
                        </ul>
                    </div>
                    <div class="card p-4" data-aos="fade-right" data-aos-delay="100">
                        <h5 class="fw-bold h6 mb-3">Office Hours</h5>
                        <p class="text-secondary small mb-0">Monday - Friday: 9 AM - 6 PM (IST)</p>
                    </div>
                </div>
                <div class="col-lg-8" data-aos="fade-left">
                    <div class="card p-5 border-0 shadow-sm">
                        <form id="advancedContactForm" novalidate>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Full Name</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Email Address</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Subject</label>
                                    <select class="form-select" id="subject" required>
                                        <option value="" selected disabled>Choose a service...</option>
                                        <option value="web">Web Development</option>
                                        <option value="design">UI/UX Design</option>
                                        <option value="seo">SEO Optimization</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Message</label>
                                    <textarea class="form-control" id="message" rows="5" required></textarea>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3" id="submitBtn">
                                        <span class="btn-text">Send Message</span>
                                        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/nprogress@0.2.0/nprogress.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/form-handler.js"></script>
</body>
</html>
